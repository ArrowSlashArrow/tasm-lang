name: Automatic PR test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    name: run cargo test
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: run tests
        working-directory: ./rtasm
        run: cargo test --verbose -- --fail-fast
